<!DOCTYPE html>
<html>
<head>
  <title>Ninja Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="camera">
  <div id="game">

    <div id="player"></div>

  </div>
</div>

<div class="ui">
  <p id="health">Health: 100</p>
</div>

<!-- CONTROLS -->
<div class="controls">

  <!-- LEFT SIDE -->
  <div class="left-controls">
    <button ontouchstart="moveLeft(true)" ontouchend="moveLeft(false)">◀</button>
    <button ontouchstart="moveRight(true)" ontouchend="moveRight(false)">▶</button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right-controls">
    <button ontouchstart="jump()">⤒</button>
    <button ontouchstart="attack()">⚔</button>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
